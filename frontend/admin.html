<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка - Планирование</title>
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="kanban.css"> </head>
<body>
    <header>
        <h1>Панель администратора</h1>
        <p>Простой инструмент для управления экскурсиями</p>
    </header>

    <nav>
        <a href="index.html">Главная</a>
        <a href="locations.html">Локации</a>
        <a href="excursions.html">Экскурсии</a>
        <a href="admin.html" style="border-bottom: 2px solid white;">Канбан-доска</a>
        <a href="login.html">Выход</a>
    </nav>

    <div class="container">
        <div id="msg-box"></div>

        <section class="add-task-section">
            <input type="text" id="task-text" placeholder="Название новой задачи...">
            <select id="task-lvl">
                <option value="low">Низкий приоритет</option>
                <option value="medium">Средний</option>
                <option value="high">Высокий</option>
            </select>
            <button id="add-btn">Добавить задачу</button>
        </section>

        <div class="board-info">
            <span>Всего задач: <b id="total-val">0</b></span>
            <select id="filter-lvl">
                <option value="all">Показать все</option>
                <option value="high">Только важные</option>
                <option value="medium">Средние</option>
                <option value="low">Низкие</option>
            </select>
        </div>

        <div class="kanban-board">
            <div class="kanban-col" id="col-todo">
                <div class="col-title">Нужно сделать (<span id="num-todo">0</span>)</div>
                <div class="list" id="todo"></div>
            </div>
            <div class="kanban-col" id="col-work">
                <div class="col-title">В работе (<span id="num-work">0</span>)</div>
                <div class="list" id="in-progress"></div>
            </div>
            <div class="kanban-col" id="col-test">
                <div class="col-title">Проверка (<span id="num-test">0</span>)</div>
                <div class="list" id="review"></div>
            </div>
            <div class="kanban-col" id="col-done">
                <div class="col-title">Готово (<span id="num-done">0</span>)</div>
                <div class="list" id="done"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="kanban.js"></script>
</body>
</html>
